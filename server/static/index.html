<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>身份证号修改</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f0f0f;color:#e0e0e0;min-height:100vh;overflow-x:hidden}
.container{width:100%;max-width:420px;margin:0 auto;padding:20px 16px;background:#1a1a1a;min-height:100vh}
h1{font-size:20px;margin-bottom:4px;text-align:center;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{color:#888;font-size:12px;margin-bottom:24px;text-align:center}

.upload-zone{border:2px dashed #333;border-radius:12px;padding:28px 16px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:20px;-webkit-tap-highlight-color:transparent}
.upload-zone:active{border-color:#667eea;background:#1e1e2e}
.upload-zone.has-image{border-style:solid;border-color:#4ade80;padding:10px}
.upload-icon{font-size:40px;display:block;margin-bottom:8px}
.upload-text{color:#888;font-size:15px}
.upload-hint{color:#555;font-size:12px;margin-top:6px}
.preview-area{display:none;position:relative}
.preview-area.show{display:block}
.preview-area img{max-width:100%;max-height:200px;border-radius:8px;margin:0 auto;display:block}
.remove-btn{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.7);color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:14px;line-height:28px;text-align:center;-webkit-tap-highlight-color:transparent}

.portrait-zone{padding:20px 10px;min-height:60px;display:flex;flex-direction:column;align-items:center;justify-content:center}.portrait-zone .preview-area img{max-height:120px}.portrait-zone.has-image{padding:8px;border-color:#4ade80}

.input-group{margin-bottom:20px}
.input-group label{display:block;font-size:14px;color:#aaa;margin-bottom:6px}
.input-group input{width:100%;background:#252525;border:1px solid #333;border-radius:10px;padding:14px;color:#e0e0e0;font-size:20px;text-align:center;letter-spacing:3px;outline:none;-webkit-appearance:none;font-family:monospace;min-height:52px;transition:border .2s}
.input-group input:focus{border-color:#667eea}
.input-group input:disabled{background:#1a1a2e;color:#667eea;border-color:#667eea;font-size:18px;letter-spacing:2px}

.btn{width:100%;padding:15px;border:none;border-radius:12px;font-size:17px;font-weight:600;cursor:pointer;min-height:54px;-webkit-tap-highlight-color:transparent;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-primary:active{opacity:.9;transform:scale(.98)}
.btn-primary:disabled{opacity:.5;transform:none}
.btn-download{min-height:40px;padding:10px 16px;background:#333;color:#ddd;border:none;border-radius:8px;cursor:pointer;font-size:14px;width:100%}

.status-bar{margin-top:14px;padding:14px;background:#252525;border-radius:8px;text-align:center;display:none}
.status-bar.show{display:block}
.status-bar .text{font-size:13px;color:#aaa;margin-bottom:10px}
.progress-track{height:4px;background:#333;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;width:30%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:2px;animation:progress-slide 1.5s ease-in-out infinite}
@keyframes progress-slide{0%{width:0%;margin-left:0%}50%{width:60%;margin-left:10%}100%{width:0%;margin-left:100%}}

.result-section{display:none;margin-top:24px;padding-top:24px;border-top:1px solid #333}
.result-section.show{display:block}
.result-section img{max-width:100%;max-height:300px;border-radius:8px;display:block;margin:0 auto 12px;cursor:pointer;transition:transform .2s}
.result-section img:hover{transform:scale(1.02)}

/* 图片放大弹窗 */
.lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);z-index:9999;justify-content:center;align-items:center;flex-direction:column}
.lightbox.show{display:flex}
.lightbox img{max-width:95%;max-height:90vh;border-radius:8px;object-fit:contain}
.lightbox .close-hint{color:#888;font-size:13px;margin-top:16px}

.info-panel{margin-top:12px;background:#1a1a2e;border:1px solid #333;border-radius:8px;display:none}
.info-panel.show{display:block}
.info-panel .row{display:flex;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #2a2a3e;font-size:13px}
.info-panel .row:last-child{border-bottom:none}
.info-panel .label{color:#888}
.info-panel .value{color:#667eea;font-weight:500;word-break:break-all}

.error-msg{background:#3a1515;color:#f87171;padding:12px;border-radius:8px;font-size:13px;margin-top:12px;display:none}
.error-msg.show{display:block}
#fileInput{display:none}

@media(min-width:700px){h1{font-size:24px}}
</style>
</head>
<body>
<div class="container">
  <h1>身份证信息修改</h1>
  <p class="subtitle">AI 编辑 · 姓名 + 号码（选填）</p>

  <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
    <span class="upload-icon">🆔</span>
    <div class="upload-text">点此上传身份证照片</div>
    <div class="upload-hint">JPG / PNG / WebP · 建议拍摄清晰</div>
    <div class="preview-area" id="previewArea">
      <img id="previewImg" alt="预览">
      <button class="remove-btn" id="removeBtn">✕</button>
    </div>
  </div>
  <input type="file" id="fileInput" accept="image/*">

  <div class="input-group">
    <label>新的姓名</label>
    <input type="text" id="nameInput" placeholder="如：张三" maxlength="20" autocomplete="off">
  </div>

  <div class="input-group">
    <label>新的身份证号码（选填）</label>
    <input type="text" id="idInput" placeholder="填了号码的话出生日期也会自动修改" maxlength="18" inputmode="numeric" autocomplete="off">
  </div>

  <div class="input-group" id="birthGroup" style="display:none">
    <label>出生日期（自动从号码提取）</label>
    <input type="text" id="birthDisplay" disabled>
  </div>

  <button class="btn btn-primary" id="submitBtn" onclick="doEdit()">开始修改</button>
  <div class="status-bar" id="statusBar">
    <div class="text">AI 正在修改身份证…</div>
    <div class="progress-track"><div class="progress-fill"></div></div>
  </div>
  <div class="error-msg" id="errorMsg"></div>

  <div class="result-section" id="resultSection">
    <img id="resultImg" alt="结果" onclick="openLightbox()">

    <div class="info-panel" id="infoPanel">
      <div class="row"><span class="label">姓名</span><span class="value" id="infoName">-</span></div>
      <div class="row"><span class="label">出生日期</span><span class="value" id="infoBirth">-</span></div>
      <div class="row"><span class="label">新号码</span><span class="value" id="infoNewId">-</span></div>
    </div>

    <button class="btn-download" onclick="download()" style="margin-top:16px">下载保存</button>
  </div>
</div>

<!-- 放大弹窗 -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" alt="放大预览">
  <div class="close-hint">点击任意处关闭</div>
</div>

<script>
let image = null;

document.getElementById('fileInput').addEventListener('change', function(e){
  const f = e.target.files[0];
  if(!f || !f.type.startsWith('image/')) return;
  if(f.size>10*1024*1024){ err('图片不能超过10MB');return }
  const r = new FileReader();
  r.onload = function(ev){
    image = ev.target.result;
    document.getElementById('previewImg').src = image;
    document.getElementById('previewArea').classList.add('show');
    document.getElementById('uploadZone').querySelector('.upload-icon').style.display='none';
    document.getElementById('uploadZone').querySelector('.upload-text').style.display='none';
    document.getElementById('uploadZone').classList.add('has-image');
  };
  r.readAsDataURL(f);
});

document.getElementById('removeBtn').addEventListener('click', function(e){
  e.stopPropagation();
  image=null;
  document.getElementById('previewArea').classList.remove('show');
  document.getElementById('uploadZone').querySelector('.upload-icon').style.display='';
  document.getElementById('uploadZone').querySelector('.upload-text').style.display='';
  document.getElementById('uploadZone').classList.remove('has-image');
  document.getElementById('fileInput').value='';
  document.getElementById('resultSection').classList.remove('show');
});

document.getElementById('idInput').addEventListener('input', function(){
  this.value = this.value.replace(/[^0-9Xx]/g,'').toUpperCase();
  const v = this.value;
  const bg = document.getElementById('birthGroup');
  const bd = document.getElementById('birthDisplay');
  if (v.length >= 14) {
    const y = v.slice(6,10), m = v.slice(10,12), d = v.slice(12,14);
    bd.value = y + '年' + parseInt(m) + '月' + parseInt(d) + '日';
    bg.style.display = 'block';
  } else {
    bg.style.display = 'none';
  }
});

async function doEdit(){
  if(!image){ err('请先上传身份证照片');return }
  const id = document.getElementById('idInput').value.trim() || null;
  const name = document.getElementById('nameInput').value.trim() || null;
  if(!id && !name){ err('至少填写姓名或身份证号中的一项');return }
  if(id && (id.length!==18 || !/^\d{17}[\dXx]$/.test(id))){ err('号码格式不正确，需为18位');return }

  const btn=document.getElementById('submitBtn');
  const sb=document.getElementById('statusBar');
  btn.disabled=true; btn.textContent='等待中…'; sb.classList.add('show');
  document.getElementById('resultSection').classList.remove('show');

  const body = {image};
  if (id) body.new_id = id;
  if (name) body.new_name = name;

  try{
    const res=await fetch('/api/edit',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    const data=await res.json();
    if(!res.ok) throw new Error(data.detail||'请求失败');

    document.getElementById('resultImg').src=data.data.image;
    document.getElementById('infoName').textContent=data.data.new_name||'-';
    document.getElementById('infoBirth').textContent=data.data.birth_date||'-';
    document.getElementById('infoNewId').textContent=data.data.new_id||'-';
    document.getElementById('infoPanel').classList.add('show');
    document.getElementById('resultSection').classList.add('show');
    document.getElementById('resultSection').scrollIntoView({behavior:'smooth'});
  }catch(e){
    err(e.message||'处理失败');
  }finally{
    btn.disabled=false; btn.textContent='开始修改'; sb.classList.remove('show');
  }
}

function download(){
  const a=document.createElement('a');
  a.href=document.getElementById('resultImg').src;
  a.download='idcard.png'; a.click();
}

function openLightbox(){
  document.getElementById('lightboxImg').src=document.getElementById('resultImg').src;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('show');
}

function err(m){
  const el=document.getElementById('errorMsg');
  el.textContent=m; el.classList.add('show'); el.scrollIntoView({behavior:'smooth'});
  setTimeout(()=>el.classList.remove('show'),8000);
}

// drag & drop
const z=document.getElementById('uploadZone');
z.addEventListener('dragover',e=>{e.preventDefault();z.style.borderColor='#764ba2'});
z.addEventListener('dragleave',()=>z.style.borderColor='');
z.addEventListener('drop',e=>{
  e.preventDefault(); z.style.borderColor='';
  const f=e.dataTransfer.files[0];
  if(f&&f.type.startsWith('image/')){
    const d=new DataTransfer(); d.items.add(f);
    document.getElementById('fileInput').files=d.files;
    document.getElementById('fileInput').dispatchEvent(new Event('change'));
  }
});
</script>
</body>
</html>
